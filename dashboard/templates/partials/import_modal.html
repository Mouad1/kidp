<!-- Import Image Modal -->
  <div id="import-image-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-3xl max-h-[80vh] rounded-2xl shadow-2xl flex flex-col">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center shrink-0">
        <h2 class="text-xl font-bold font-header text-gray-800">Importer une image existante</h2>
        <button onclick="closeImportModal()" class="text-gray-400 hover:text-gray-900 text-xl font-bold leading-none">✕</button>
      </div>
      
      <div class="flex flex-1 min-h-0 overflow-hidden">
        <!-- Sidebar: Book List -->
        <div class="w-1/3 border-r border-gray-100 overflow-y-auto bg-gray-50 p-4 shrink-0">
          <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Sélectionner le dossier</h3>
          <div id="import-books-list" class="space-y-1">
             <div class="text-xs text-gray-400 italic">Chargement...</div>
          </div>
        </div>
        
        <!-- Main: Image Grid -->
        <div class="w-2/3 overflow-y-auto p-4 shrink-0 relative bg-white">
          <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Images disponibles</h3>
          <div id="import-images-grid" class="grid grid-cols-3 gap-3">
             <div class="text-xs text-gray-400 italic">Sélectionne un dossier à gauche</div>
          </div>
        </div>
      </div>
    </div>
  </div>
