<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} · Aperçu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <a href="/store" class="text-sm text-gray-500 hover:text-gray-800 transition">← Choisir une autre histoire</a>
      <div class="text-right">
        <p class="font-bold">{{ title }}</p>
        <p class="text-xs text-gray-500">{{ pages|length }} pages</p>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-2xl mx-auto w-full px-6 py-8">

    {% for p in pages %}
    <div class="slide {% if not loop.first %}hidden{% endif %}" data-index="{{ loop.index0 }}">
      {% if p.has_image %}
      <img src="{{ p.image_url }}" alt="Page {{ p.num }}"
           class="w-full rounded-xl object-contain max-h-[60vh] bg-white border border-gray-100 shadow-sm" />
      {% else %}
      <div class="w-full rounded-xl bg-gray-100 border border-dashed border-gray-300 flex items-center justify-center"
           style="min-height: 300px;">
        <span class="text-gray-400 text-sm">Illustration page {{ p.num }}</span>
      </div>
      {% endif %}
      <p class="mt-6 text-lg leading-relaxed text-gray-800">{{ p.text }}</p>
    </div>
    {% endfor %}

    <div class="flex items-center justify-between mt-10">
      <button id="prev-btn" onclick="navigate(-1)"
              class="px-5 py-2 rounded-lg border border-gray-300 text-sm font-medium hover:bg-gray-100 transition disabled:opacity-30">
        ← Précédent
      </button>
      <span id="page-indicator" class="text-sm text-gray-500 font-medium">1 / {{ pages|length }}</span>
      <button id="next-btn" onclick="navigate(1)"
              class="px-5 py-2 rounded-lg border border-gray-300 text-sm font-medium hover:bg-gray-100 transition disabled:opacity-30">
        Suivant →
      </button>
    </div>

  </main>

  <div class="sticky bottom-0 bg-white border-t border-gray-200 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
      <p class="text-sm text-gray-500">Cette histoire vous plaît ?</p>
      <a href="/store/{{ slug }}"
         class="bg-purple-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-purple-700 transition text-sm">
        Personnaliser ce livre →
      </a>
    </div>
  </div>

  <script>
    const total = {{ pages|length }};
    let current = 0;

    function navigate(dir) {
      document.querySelectorAll('.slide')[current].classList.add('hidden');
      current = Math.max(0, Math.min(total - 1, current + dir));
      document.querySelectorAll('.slide')[current].classList.remove('hidden');
      document.getElementById('page-indicator').textContent = `${current + 1} / ${total}`;
      document.getElementById('prev-btn').disabled = current === 0;
      document.getElementById('next-btn').disabled = current === total - 1;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    document.getElementById('prev-btn').disabled = true;
    if (total <= 1) document.getElementById('next-btn').disabled = true;
  </script>

</body>
</html>
