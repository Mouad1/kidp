<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouvelle Story — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center gap-4">
      <a href="/admin/stories" class="text-indigo-600 hover:text-indigo-800 text-sm">← Stories</a>
      <h1 class="text-lg font-bold">Nouvelle Story</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-10 space-y-8">
    <section class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h2 class="font-semibold text-gray-700">1 · Identité du book</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-sm text-gray-600 mb-1">Nom technique <span class="text-gray-400 text-xs">(ex: lolo-jungle)</span></label>
          <input id="book-name" type="text" placeholder="mon-histoire"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            pattern="[a-z0-9][a-z0-9-]*[a-z0-9]" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Titre affiché</label>
          <input id="book-title" type="text" placeholder="Lolo dans la jungle"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Auteur <span class="text-gray-400 text-xs">(optionnel)</span></label>
          <input id="book-author" type="text"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Nombre de pages</label>
          <select id="page-count" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="6">6 pages</option>
            <option value="8" selected>8 pages</option>
            <option value="10">10 pages</option>
            <option value="12">12 pages</option>
            <option value="16">16 pages</option>
          </select>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h2 class="font-semibold text-gray-700">2 · Source de l'histoire</h2>
      <div class="flex gap-2 mb-2">
        <button onclick="setSourceMode('text')" id="mode-text"
          class="px-3 py-1.5 rounded-lg text-sm font-medium bg-indigo-600 text-white">Texte / Idée</button>
        <button onclick="setSourceMode('url')" id="mode-url"
          class="px-3 py-1.5 rounded-lg text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50">URL vidéo</button>
      </div>
      <div id="source-text-panel">
        <label class="block text-sm text-gray-600 mb-1">Colle ton script, idée d'histoire, ou description</label>
        <textarea id="source-text" rows="8"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="Ex: Joudia est une petite fille curieuse qui découvre une forêt enchantée..."></textarea>
      </div>
      <div id="source-url-panel" class="hidden">
        <label class="block text-sm text-gray-600 mb-1">URL de la vidéo (YouTube, etc.)</label>
        <input id="source-url" type="url" placeholder="https://youtube.com/watch?v=..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
    </section>

    <div>
      <button id="btn-create" onclick="createAndGenerate()"
        class="w-full py-3 rounded-xl text-sm font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition-colors">
        Créer et générer le script
      </button>
      <p id="error-msg" class="text-red-600 text-sm mt-2 hidden"></p>
      <div id="progress" class="hidden mt-4 bg-indigo-50 rounded-xl p-4 text-sm text-indigo-700">
        <div class="flex items-center gap-2">
          <span class="inline-block w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full spin"></span>
          <span id="progress-msg">Initialisation...</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    let sourceMode = 'text';

    function setSourceMode(mode) {
      sourceMode = mode;
      document.getElementById('source-text-panel').classList.toggle('hidden', mode !== 'text');
      document.getElementById('source-url-panel').classList.toggle('hidden', mode !== 'url');
      const active = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-indigo-600 text-white';
      const inactive = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50';
      document.getElementById('mode-text').className = mode === 'text' ? active : inactive;
      document.getElementById('mode-url').className = mode === 'url' ? active : inactive;
    }

    async function createAndGenerate() {
      const name = document.getElementById('book-name').value.trim();
      const title = document.getElementById('book-title').value.trim();
      const author = document.getElementById('book-author').value.trim();
      const pageCount = parseInt(document.getElementById('page-count').value);
      const source = sourceMode === 'url'
        ? document.getElementById('source-url').value.trim()
        : document.getElementById('source-text').value.trim();

      document.getElementById('error-msg').classList.add('hidden');

      if (!name) return showError('Nom technique requis.');
      if (!/^[a-z0-9][a-z0-9-]*[a-z0-9]$/.test(name)) return showError('Nom: minuscules et tirets uniquement.');
      if (!title) return showError('Titre requis.');
      if (!source) return showError('Source requise.');

      const btn = document.getElementById('btn-create');
      btn.disabled = true;
      document.getElementById('progress').classList.remove('hidden');

      setProgress('Création du book...');
      try {
        const r = await fetch('/api/storyforge', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, title, author}),
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          return showError(e.detail || 'Erreur création book.');
        }
      } catch (e) {
        return showError('Erreur réseau.');
      }

      setProgress('Génération du script en cours...');
      try {
        const response = await fetch(`/stream/storyforge/${name}/generate-script`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source, page_count: pageCount}),
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          for (const line of chunk.split('\n\n')) {
            if (!line.startsWith('data: ')) continue;
            const msg = line.slice(6);
            if (msg === '[DONE]') {
              window.location.href = `/admin/stories/${name}/script`;
              return;
            }
            if (msg.startsWith('ERROR:')) { showError(msg); return; }
            setProgress(msg);
          }
        }
      } catch (e) {
        showError('Erreur génération script.');
      } finally {
        btn.disabled = false;
      }
    }

    function setProgress(msg) {
      document.getElementById('progress-msg').textContent = msg;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
      document.getElementById('btn-create').disabled = false;
      document.getElementById('progress').classList.add('hidden');
    }
  </script>
</body>
</html>
